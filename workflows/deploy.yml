name: Update and deploy the QIM Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: qimserver.compute.dtu.dk
          username: fima
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            /home/fima/scripts/update-website.sh
